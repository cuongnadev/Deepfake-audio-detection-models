<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fake Audio Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
    <div class="background"></div>

    <div class="card">
        <h1>🎙 Fake Audio<br />Detector</h1>

        <form method="post" enctype="multipart/form-data">
            <div class="upload-row">
                <!-- label làm nút chọn file -->
                <label class="file-label" for="audioInput">
                    <span class="file-btn-text">Choose File</span>
                    <span id="fileName" class="file-name">No file chosen</span>
                </label>

                <!-- input file thật (ẩn) -->
                <input id="audioInput" type="file" name="audio" accept=".wav,.mp3" required>

                <button type="submit">Analyze</button>
            </div>
        </form>

        {% if result %}
        <div class="result result-{{ result.label }}">
            <div class="result-header">
                <span class="result-badge">
                    {{ "Fake" if result.label == "fake" else "Real" }}
                </span>
                <span class="result-title">Prediction Result</span>
            </div>

            <div class="result-main">
                <div class="result-label">
                    {{ result.label|upper }}
                </div>
            </div>

            <div class="prob-block">
                <div class="prob-top">
                    <span>Fake probability</span>
                    <strong>{{ "%.2f"|format(result.fake_prob|float * 100) }}%</strong>
                </div>
                <div class="progress">
                    <div class="progress-fill fake-fill" style="width: {{ result.fake_prob|float * 100 }}%;"></div>
                </div>
            </div>

            <div class="prob-block">
                <div class="prob-top">
                    <span>Real probability</span>
                    <strong>{{ "%.2f"|format(result.real_prob|float * 100) }}%</strong>
                </div>
                <div class="progress">
                    <div class="progress-fill real-fill" style="width: {{ result.real_prob|float * 100 }}%;"></div>
                </div>
            </div>
        </div>
        {% endif %}
    </div>

    <script>
        const audioInput = document.getElementById("audioInput");
        const fileName = document.getElementById("fileName");

        audioInput.addEventListener("change", () => {
            if (audioInput.files && audioInput.files.length > 0) {
                fileName.textContent = audioInput.files[0].name;
            } else {
                fileName.textContent = "No file chosen";
            }
        });
    </script>
</body>

</html>
